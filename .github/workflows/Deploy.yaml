name: CI-CD
# CI-CD pipeline triggered when a pull request is merged into the main branch

on:
  pull_request:
    types: [closed]

jobs:
  continuous-integration:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: config AWS credentials
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set default.region eu-north-1

      - name: login to ECR
        run: |
          aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 487620625686.dkr.ecr.eu-north-1.amazonaws.com


      - name: Build and Push Docker image to ECR
        run: |
          docker build -t salim-ledna-app:${{ github.run_number }} .
          docker tag salim-ledna-app:${{ github.run_number }} 487620625686.dkr.ecr.eu-north-1.amazonaws.com/salim-ledna-app:${{ github.run_number }}
          docker push 487620625686.dkr.ecr.eu-north-1.amazonaws.com/salim-ledna-app:${{ github.run_number }}
  
  # continuous-deployment:
  #   runs-on: ubuntu-latest
  #   needs: continuous-integration
  #   steps:
  #     - name: Check my ssh key
  #       run: |
  #         echo "${{ secrets.EC2_SSH_KEY }}" > mykey.pem
  #         chmod 400 mykey.pem

  #         ssh -o StrictHostKeyChecking=no -i mykey.pem ec2-user@13.48.42.102 "docker pull 487620625686.dkr.ecr.eu-north-1.amazonaws.com/salim-ledna-app:${{ github.run_number }}"


  #         ssh -o StrictHostKeyChecking=no -i mykey.pem ec2-user@13.48.42.102 "docker run -d -p 443:80 487620625686.dkr.ecr.eu-north-1.amazonaws.com/salim-ledna-app:${{ github.run_number }}"

  continuous-cluster-deployment:
    runs-on: ubuntu-latest
    needs: continuous-integration
    steps:
      - name: update-k8s-deployment-config
        run: |
          git clone https://${{ secrets.GITOPS_USERNAME }}:${{secrets.GITOPS_TOKEN}}@github.com/Daczy-Alpha/ledna-app-config.git
          cd ledna-app-config
          cat ledna-app-deployment.yaml
          sed -i "s+487620625686.dkr.ecr.eu-north-1.amazonaws.com/salim-ledna-app:.*+487620625686.dkr.ecr.eu-north-1.amazonaws.com/salim-ledna-app:${{ github.run_number }}+g" ledna-app-deployment.yaml
          cat ledna-app-deployment.yaml
          git add .
          git config user.name ${{ secrets.GITOPS_USERNAME }}
          git config user.email ${{ secrets.GITOPS_EMAIL }}
          git commit -m "update deployment image to ${{ github.run_number }}"
          git push origin main
